# ==============================================================
# POS Enterprise - Docker Compose (desarrollo local)
# ==============================================================
# Uso:
#   make up        - Levantar todo
#   make down      - Detener todo
#   make logs      - Ver logs en vivo
#
# Servicios:
#   - app          PHP 8.3 FPM + Laravel
#   - nginx        Reverse proxy / web server
#   - postgres     PostgreSQL 16
#   - redis        Redis 7
#   - reverb       WebSockets server
#   - queue        Worker de colas
#   - scheduler    Scheduler de tareas programadas
#   - frontend     Vite dev server con HMR
#   - mailhog      Captura de emails en desarrollo
# ==============================================================

services:
  # ----------------------------------------------------------
  # Backend - PHP-FPM
  # ----------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        WWW_USER_ID: ${UID:-1000}
        WWW_GROUP_ID: ${GID:-1000}
    container_name: pos-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zz-pos.ini:ro
    env_file:
      - .env
    environment:
      PHP_IDE_CONFIG: "serverName=pos-local"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pos-net

  # ----------------------------------------------------------
  # Nginx - sirviendo Laravel
  # ----------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: pos-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - pos-net

  # ----------------------------------------------------------
  # PostgreSQL 16
  # ----------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: pos-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"   # 5433 en host evita choque con Postgres del sistema
    environment:
      POSTGRES_DB: pos
      POSTGRES_USER: pos
      POSTGRES_PASSWORD: pos_dev_secret_change_me
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - pos-postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos -d pos"]
      interval: 5s
      timeout: 3s
      retries: 10
    command:
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=1GB"
      - "-c"
      - "log_statement=mod"
      - "-c"
      - "log_min_duration_statement=500"
    networks:
      - pos-net

  # ----------------------------------------------------------
  # Redis 7
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pos-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"   # 6380 en host evita choque con Redis del sistema
    command:
      - "redis-server"
      - "/usr/local/etc/redis/redis.conf"
      - "--requirepass"
      - "redis_dev_secret_change_me"
    volumes:
      - pos-redis-data:/data
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_dev_secret_change_me", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - pos-net

  # ----------------------------------------------------------
  # Reverb (WebSockets)
  # ----------------------------------------------------------
  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        WWW_USER_ID: ${UID:-1000}
        WWW_GROUP_ID: ${GID:-1000}
    container_name: pos-reverb
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    ports:
      - "8081:8080"
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - pos-net

  # ----------------------------------------------------------
  # Queue worker
  # ----------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        WWW_USER_ID: ${UID:-1000}
        WWW_GROUP_ID: ${GID:-1000}
    container_name: pos-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--queue=high,default,low", "--tries=3", "--backoff=3,10,30", "--max-time=3600"]
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - pos-net

  # ----------------------------------------------------------
  # Scheduler (cron de Laravel)
  # ----------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: development
      args:
        WWW_USER_ID: ${UID:-1000}
        WWW_GROUP_ID: ${GID:-1000}
    container_name: pos-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command:
      - "sh"
      - "-c"
      - |
        while :; do
          php artisan schedule:run --verbose --no-interaction
          sleep 60
        done
    volumes:
      - ./backend:/var/www/html
      - ./.env:/var/www/html/.env:ro
    env_file:
      - .env
    depends_on:
      app:
        condition: service_started
    networks:
      - pos-net

  # ----------------------------------------------------------
  # Frontend - Vite dev server
  # ----------------------------------------------------------
  frontend:
    image: node:22-alpine
    container_name: pos-frontend
    restart: unless-stopped
    working_dir: /app
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - pos-frontend-node-modules:/app/node_modules
      - ./backend/docs/openapi:/app/openapi-spec:ro
    environment:
      VITE_API_URL: http://localhost:8080/api/v1
      VITE_REVERB_APP_KEY: local_key_change_me
      VITE_REVERB_HOST: localhost
      VITE_REVERB_PORT: 8081
      VITE_REVERB_SCHEME: ws
    networks:
      - pos-net

  # ----------------------------------------------------------
  # MailHog - captura emails
  # ----------------------------------------------------------
  mailhog:
    image: mailhog/mailhog:latest
    container_name: pos-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - pos-net

# ==============================================================
# Volúmenes persistentes
# ==============================================================
volumes:
  pos-postgres-data:
    driver: local
  pos-redis-data:
    driver: local
  pos-frontend-node-modules:
    driver: local

# ==============================================================
# Red interna
# ==============================================================
networks:
  pos-net:
    driver: bridge
