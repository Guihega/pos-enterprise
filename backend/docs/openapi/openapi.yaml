        '400':
          $ref: '#/components/responses/TenantNotResolved'
        '401':
          description: No autenticado o token invalido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: El usuario no tiene permiso `customer.update`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Cliente no encontrado en el tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'
    delete:
      operationId: deleteCustomer
      tags: [Customers]
      summary: Elimina un cliente (soft delete)
      description: |
        Elimina un cliente. Requiere permiso `customer.delete`. Si el cliente
        tiene saldo deudor (`credit.balance` mayor a cero) la API responde
        `409 CUSTOMER_HAS_BALANCE` y no lo elimina.
      parameters:
        - $ref: '#/components/parameters/XTenant'
        - $ref: '#/components/parameters/XRequestId'
        - in: path
          name: uuid
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Cliente eliminado, sin contenido.
        '400':
          $ref: '#/components/responses/TenantNotResolved'
        '401':
          description: No autenticado o token invalido.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '403':
          description: El usuario no tiene permiso `customer.delete`.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          description: Cliente no encontrado en el tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '409':
          description: El cliente tiene saldo deudor y no puede eliminarse.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum
      description: |
        Token Bearer de Laravel Sanctum. Se obtiene en `POST /auth/login`.
        Formato: `<id>|<plain>` (ej. `1|pos_mzifR6jaz...`).
    tenantHeader:
      type: apiKey
      in: header
      name: X-Tenant
      description: |
        Slug o UUID del Company al que pertenece el request. Obligatorio en
        todo endpoint salvo `/health`. Si no resuelve a un tenant existente,
        la API responde `400 TENANT_NOT_RESOLVED`.

  parameters:
    XTenant:
      in: header
      name: X-Tenant
      required: true
      description: Slug o UUID del Company.
      schema:
        type: string
        example: tenant-a
    XRequestId:
      in: header
      name: X-Request-Id
      required: false
      description: |
        Identificador del cliente para correlacionar logs. Si se envía, se
        devuelve en `error.request_id` en respuestas de error.
      schema:
        type: string
        format: uuid

  schemas:

    # ----- Auth: input/output -----

    LoginRequestBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          maxLength: 200
          description: Email del usuario. Se normaliza a minúsculas y se hace trim.
        password:
          type: string
          minLength: 1
          maxLength: 255
        device_id:
          type: [string, 'null']
          maxLength: 100
          description: |
            Identificador del dispositivo. Alternativamente puede enviarse
            como header `X-Device-Id`.
        token_name:
          type: [string, 'null']
          maxLength: 100
          description: Nombre del token en `personal_access_tokens`. Default `pos-session`.

    LoginResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user, token, token_type]
          properties:
            user:
              $ref: '#/components/schemas/User'
            token:
              type: string
              description: Token plano. Formato `<id>|<plain>`.
              example: '1|pos_mzifR6jazPwcCaUHwgAAOPSFeM2m3hXJdDDaCSgWe2224d65'
            token_type:
              type: string
              enum: [Bearer]

    # ----- Recursos -----

    User:
      type: object
      required: [uuid, name, email, is_active, must_change_password, two_factor_enabled, has_pin, roles]
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        username:
          type: [string, 'null']
        is_active:
          type: boolean
        must_change_password:
          type: boolean
        two_factor_enabled:
          type: boolean
        has_pin:
          type: boolean
        locale:
          type: [string, 'null']
          example: es-MX
        timezone:
          type: [string, 'null']
          example: America/Mexico_City
        last_login_at:
          type: [string, 'null']
          format: date-time
        default_branch:
          $ref: '#/components/schemas/Branch'
        branches:
          type: array
          items:
            $ref: '#/components/schemas/Branch'
        roles:
          type: array
          items:
            type: string
          example: [admin]
        created_at:
          type: string
          format: date-time

    Branch:
      type: object
      required: [uuid, code, name]
      properties:
        uuid:
          type: string
          format: uuid
        code:
          type: string
          example: BNV3
        name:
          type: string
          example: Sucursal Centro
        default_warehouse_uuid:
          type: [string, 'null']
          format: uuid
          description: |
            UUID del almacen marcado como default para esta sucursal.
            Solo se incluye cuando el endpoint eager-carga la relacion
            (GET /auth/me lo hace para `default_branch`). En el array
            `branches[]` del usuario y en otros contextos donde la
            relacion no se carga, el campo es null o esta ausente.

    # ----- Errores: envoltura genérica y variantes -----

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, details, timestamp]
          properties:
            code:
              type: string
              description: |
                Código de error estable. Valores conocidos:
                `UNAUTHENTICATED`, `INVALID_CREDENTIALS`, `ACCOUNT_INACTIVE`,
                `ACCOUNT_LOCKED`, `PIN_INVALID`, `TENANT_NOT_RESOLVED`,
                `TENANT_SUSPENDED`, `NOT_FOUND`, `INSUFFICIENT_STOCK`,
                `INSUFFICIENT_CREDIT`, `PAYMENT_MISMATCH`,
                `SALE_NOT_CANCELLABLE`, `SESSION_NOT_OPEN`,
                `SESSION_ALREADY_OPEN`, `INVALID_ARGUMENT`.
            message:
              type: string
              description: Mensaje legible para humanos.
            details:
              description: |
                Detalles específicos del error. Estructura depende del código.
                Por ejemplo, `ACCOUNT_LOCKED` incluye `seconds_remaining`.
              oneOf:
                - type: object
                - type: array
            request_id:
              type: [string, 'null']
            timestamp:
              type: string
              format: date-time

    ValidationErrorBody:
      type: object
      required: [message, errors]
      description: |
        Formato NATIVO de Laravel para errores de validación (HTTP 422).
        NO usa la envoltura `error` del proyecto: se mantiene el formato
        nativo por compatibilidad con la suite de tests existente.
      properties:
        message:
          type: string
          example: The given data was invalid.
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          example:
            email: [El correo es obligatorio.]
            password: [La contraseña es obligatoria.]

