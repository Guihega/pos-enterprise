            min:
              type: number
              nullable: true
            max:
              type: number
              nullable: true
            is_low:
              type: boolean
            is_overstock:
              type: boolean
        average_cost:
          type: number
        last_movement_at:
          type: string
          format: date-time
          nullable: true
    StockListResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Stock'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CashSessionListResponse:
      type: object
      required: [data, links, meta]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CashSession'
        links:
          $ref: '#/components/schemas/PaginationLinks'
        meta:
          $ref: '#/components/schemas/PaginationMeta'
    CashSessionResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: '#/components/schemas/CashSession'
    OpenCashSessionRequest:
      type: object
      required: [cash_register_uuid]
      properties:
        cash_register_uuid:
          type: string
          format: uuid
        opening_amount:
          type: number
          format: float
          minimum: 0
          maximum: 9999999.99
          default: 0
        opening_notes:
          type: [string, 'null']
          maxLength: 500
    CloseCashSessionRequest:
      type: object
      required: [counted_amount]
      properties:
        counted_amount:
          type: number
          format: float
          minimum: 0
          maximum: 9999999.99
          description: Monto contado fisicamente al cierre.
        closing_notes:
          type: [string, 'null']
          maxLength: 500

    # ----- Sales -----

    CreateSaleItem:
      type: object
      required: [product_uuid, quantity]
      properties:
        product_uuid:
          type: string
          format: uuid
        quantity:
          type: number
          minimum: 0
          exclusiveMinimum: true
          maximum: 9999999.9999
          description: Cantidad. Mayor que cero.
        unit_price:
          type: number
          minimum: 0
          nullable: true
          description: |
            Precio unitario override (opcional). Si se omite, se toma
            del producto.
        discount_percent:
          type: number
          minimum: 0
          maximum: 100
          nullable: true
          description: Descuento porcentual (0-100).
        discount_amount:
          type: number
          minimum: 0
          nullable: true
          description: |
            Descuento absoluto. Si se especifica junto a `discount_percent`,
            el servicio decide la combinacion (ver SaleTotalsCalculator).
        notes:
          type: string
          maxLength: 500
          nullable: true

    CreateSalePayment:
      type: object
      required: [method, amount]
      properties:
        method:
          type: string
          enum:
            - cash
            - card_credit
            - card_debit
            - transfer
            - check
            - voucher
            - credit
            - other
          description: |
            Metodo de pago. `cash` es el unico que admite `tendered_amount`
            mayor que `amount` (genera cambio). `credit` consume credito
            del cliente y requiere `customer_uuid`.
        amount:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Monto aplicado a la venta con este metodo.
        tendered_amount:
          type: number
          minimum: 0
          nullable: true
          description: |
            Monto fisicamente entregado por el cliente (solo aplica a
            `cash`). Si es mayor que `amount`, la diferencia se devuelve
            como cambio en `totals.change`.
        reference:
          type: string
          maxLength: 255
          nullable: true
          description: Referencia externa (numero de cheque, ID de transferencia, etc.).
        authorization_code:
          type: string
          maxLength: 100
          nullable: true
          description: Codigo de autorizacion (terminales de tarjeta).
        card_brand:
          type: string
          maxLength: 50
          nullable: true
          example: visa
        card_last4:
          type: string
          minLength: 4
          maxLength: 4
          nullable: true
          example: '4242'

    CreateSaleRequest:
      type: object
      required: [cash_session_uuid, warehouse_uuid, items, payments]
      properties:
        cash_session_uuid:
          type: string
          format: uuid
          description: UUID de la sesion de caja abierta (POST /cash/sessions/open).
        warehouse_uuid:
          type: string
          format: uuid
          description: UUID del almacen del que se descuenta el stock.
        customer_uuid:
          type: string
          format: uuid
          nullable: true
          description: Cliente registrado (opcional, requerido si hay metodo `credit`).
        customer_name:
          type: string
          maxLength: 255
          nullable: true
          description: Nombre del cliente para tickets sin cliente registrado.
        customer_tax_id:
          type: string
          maxLength: 50
          nullable: true
        tip_amount:
          type: number
          minimum: 0
          nullable: true
        notes:
          type: string
          maxLength: 1000
          nullable: true
        series:
          type: string
          maxLength: 10
          nullable: true
          description: Serie de folio (opcional, si se omite se usa la default).
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSaleItem'
        payments:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSalePayment'

    SaleTotals:
      type: object
      required: [subtotal, discount, tax, tip, total, paid, change]
      properties:
        subtotal:
          type: number
          description: Suma de `line_subtotal` de todos los items (antes de descuentos y de IVA exclusivo).
        discount:
          type: number
          description: Total de descuentos aplicados.
        tax:
          type: number
          description: Total de impuestos.
        tip:
          type: number
        total:
          type: number
          description: Total final a pagar.
        paid:
          type: number
          description: Suma de `amount` de todos los `payments`.
        change:
          type: number
          description: Cambio devuelto al cliente (solo > 0 si hubo `tendered_amount` > `amount` en pago `cash`).

    SaleCustomerEmbedded:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
          nullable: true
        tax_id:
          type: string
          nullable: true

    SaleItemEmbedded:
      type: object
      required:
        - uuid
        - product_sku
        - product_name
        - quantity
        - unit_price
        - line_subtotal
        - line_total
      properties:
        uuid:
          type: string
          format: uuid
        product_uuid:
          type: string
          format: uuid
          nullable: true
        product_sku:
          type: string
        product_name:
          type: string
        unit_name:
          type: string
          nullable: true
        quantity:
          type: number
        unit_price:
          type: number
        unit_cost:
          type: number
        line_subtotal:
          type: number
        discount_percent:
          type: number
        discount_amount:
          type: number
        is_taxable:
          type: boolean
        tax_inclusive:
          type: boolean
        tax_rate:
          type: number
        tax_amount:
          type: number
        tax_code:
          type: string
          nullable: true
        line_total:
          type: number

    SalePaymentEmbedded:
      type: object
      required: [uuid, method, amount, captured_at]
      properties:
        uuid:
          type: string
          format: uuid
        method:
          type: string
          enum:
            - cash
            - card_credit
            - card_debit
            - transfer
            - check
            - voucher
            - credit
            - other
        amount:
          type: number
        tendered_amount:
          type: number
          nullable: true
        reference:
          type: string
          nullable: true
        card_brand:
          type: string
          nullable: true
        card_last4:
          type: string
          nullable: true
        captured_at:
          type: string
          format: date-time

    SaleTaxEmbedded:
      type: object
      required: [code, name, rate, taxable_base, amount]
      properties:
        code:
          type: string
        name:
          type: string
        rate:
          type: number
        taxable_base:
          type: number
        amount:
          type: number

    SaleCashier:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string

    SaleVoidInfo:
      type: object
      nullable: true
      description: |
        Presente solo si `status` es `voided`. En ventas completadas
        este campo es `null`.
      properties:
        reason:
          type: string
        voided_at:
          type: string
          format: date-time
        by:
          $ref: '#/components/schemas/SaleCashier'

    Sale:
      type: object
      description: Recurso de venta completa.
      required:
        - uuid
        - number
        - status
        - currency_code
        - totals
        - created_at
      properties:
        uuid:
          type: string
          format: uuid
        number:
          type: string
          description: Folio consecutivo dentro de la serie.
        series:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, completed, voided, refunded]
        currency_code:
          type: string
          example: MXN
        totals:
          $ref: '#/components/schemas/SaleTotals'
        customer:
          $ref: '#/components/schemas/SaleCustomerEmbedded'
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleItemEmbedded'
        payments:
          type: array
          items:
            $ref: '#/components/schemas/SalePaymentEmbedded'
        taxes:
          type: array
          items:
            $ref: '#/components/schemas/SaleTaxEmbedded'
        notes:
          type: string
          nullable: true
        void:
          $ref: '#/components/schemas/SaleVoidInfo'
        cashier:
          $ref: '#/components/schemas/SaleCashier'
        completed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    CancelSaleRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 3
          maxLength: 500
          description: Motivo de la cancelacion de la venta.
          example: "Producto danado, cliente solicita devolucion."


    SaleResponse:
        type: object
        required: [data]
        properties:
          data:
            $ref: '#/components/schemas/Sale'
  
  responses:

    Unauthenticated:
      description: |
        No autenticado. Puede deberse a: falta de token, token inválido,
        token revocado, o token cuyo dueño no pertenece al tenant del
        header `X-Tenant`.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: UNAUTHENTICATED
              message: Unauthenticated.
              details: []
              request_id: null
              timestamp: '2026-05-27T12:00:00Z'

    TenantNotResolved:
      description: |
        El header `X-Tenant` no se envió, está vacío, o apunta a un slug/UUID
        que no corresponde a ningún Company. Se devuelve ANTES de evaluar
        autenticación.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: TENANT_NOT_RESOLVED
              message: No se pudo determinar el tenant del request.
              details: []
              request_id: null
              timestamp: '2026-05-27T12:00:00Z'

    TenantSuspended:
      description: La cuenta del tenant está suspendida o cancelada.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          example:
            error:
              code: TENANT_SUSPENDED
              message: La cuenta está suspendida o cancelada.
              details:
                status: suspended
                suspension_reason: payment_overdue
              request_id: null
              timestamp: '2026-05-27T12:00:00Z'

    ValidationError:
      description: |
        Error de validación del request. Formato NATIVO de Laravel
        (`{ message, errors }`), no la envoltura `error` del proyecto.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorBody'

    TooManyRequests:
      description: |
        Se excedió el rate limit del endpoint. `/auth/login` permite 5/min
        por IP; `/auth/pin-verify` permite 10/min.
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Too Many Attempts.
