server {
    listen 80 default_server;
    server_name _;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # --- Headers de seguridad ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Request-ID $request_id always;

    # --- Healthcheck rápido (no pasa por PHP) ---
    location = /health/live {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ok","service":"nginx"}';
    }

    # --- favicon y robots silenciosos ---
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # --- Archivos estáticos con cache largo ---
    location ~* \.(?:jpg|jpeg|gif|png|webp|svg|ico|woff|woff2|ttf|otf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Routing principal de Laravel ---
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # --- PHP-FPM ---
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;
        fastcgi_param HTTP_X_REQUEST_ID $request_id;
        fastcgi_read_timeout 120;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # --- Bloquear archivos sensibles ---
    location ~ /\.(?!well-known).* {
        deny all;
    }
    location ~* \.(env|log|ini|sh|sql|md|lock)$ {
        deny all;
    }
}
