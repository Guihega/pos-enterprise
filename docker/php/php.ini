; ==============================================================
; PHP 8.3 - configuración POS Enterprise (desarrollo)
; ==============================================================

; --- General ---
memory_limit = 512M
max_execution_time = 60
max_input_time = 60
post_max_size = 32M
upload_max_filesize = 16M
max_file_uploads = 20

; --- Timezone ---
date.timezone = "America/Mexico_City"

; --- Error reporting (verbose en desarrollo) ---
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /dev/stderr

; --- Sesiones (no las usamos directamente, Laravel maneja) ---
session.cookie_httponly = On
session.cookie_samesite = "Lax"
session.use_strict_mode = On

; --- Realpath cache (importante para Laravel) ---
realpath_cache_size = 4M
realpath_cache_ttl = 600

; --- OPcache deshabilitado en dev para ver cambios de inmediato ---
opcache.enable = 0
opcache.enable_cli = 0

; --- Misc ---
expose_php = Off
