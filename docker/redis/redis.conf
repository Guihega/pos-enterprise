# ==============================================================
# Redis 7 - configuración POS Enterprise
# ==============================================================

# --- Red ---
bind 0.0.0.0
protected-mode yes
port 6379
tcp-backlog 511
tcp-keepalive 300
timeout 0

# --- General ---
daemonize no
loglevel notice
databases 16

# --- Persistencia ---
# RDB snapshot
save 3600 1
save 300 100
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF para mayor durabilidad (operaciones críticas POS)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes

# --- Memoria ---
maxmemory 512mb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# --- Slow log ---
slowlog-log-slower-than 10000
slowlog-max-len 128

# --- Latency monitoring ---
latency-monitor-threshold 100

# --- Comandos peligrosos renombrados (defense in depth) ---
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command CONFIG   "POS_CONFIG_91827364"
rename-command DEBUG    ""
rename-command SHUTDOWN "POS_SHUTDOWN_91827364"
